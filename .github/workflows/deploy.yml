# =============================================================================
# Elite MGMT Agency · Deploy (Cloudflare Pages)
#
# Triggers on push to `main` after CI has passed. Uses the Cloudflare Pages
# direct-upload API via Wrangler.
#
# Required repository secrets:
#   - CLOUDFLARE_API_TOKEN        Token with Pages: Edit permission
#   - CLOUDFLARE_ACCOUNT_ID       Cloudflare account UUID
#
# Required repository variables:
#   - CLOUDFLARE_PAGES_PROJECT    Pages project name (e.g. "elite-mgmt-agency")
#
# Owner: Viral Ventures LLC
# =============================================================================

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  wait-for-ci:
    name: Gate on CI green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lewagon/wait-on-check-action@v1.4.0
        with:
          ref: ${{ github.sha }}
          running-workflow-name: 'Gate on CI green'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success
          verbose: true

  deploy:
    name: Cloudflare Pages (production)
    runs-on: ubuntu-latest
    needs: wait-for-ci
    environment:
      name: production
      url: https://elite-mgmt-agency.com
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strip dev artifacts from upload
        run: |
          rm -rf node_modules
          rm -rf extracted
          rm -rf .lighthouseci
          rm -rf .pa11y
          rm -f "Elite MGMT Agency-handoff.zip"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main --commit-dirty=true

      - name: Annotate deploy
        if: success()
        run: |
          echo "::notice title=Production deploy::https://elite-mgmt-agency.com @ ${{ github.sha }}"
